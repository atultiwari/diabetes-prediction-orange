services:
  backend:
    build:
      context: ./backend
    image: orange-model-demo-backend
    environment:
      QT_QPA_PLATFORM: offscreen
      FRONTEND_ORIGIN: "http://localhost:3000"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    command: sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm dev --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  uploads:
  frontend_node_modules:
