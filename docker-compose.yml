# Single-image deployment. Same Dockerfile used locally and on Coolify.
#
# In production (Coolify) you don't need this file at all — point Coolify at
# the root Dockerfile. This file is here so local devs can run the production
# image with `docker compose up --build` instead of bare docker commands.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: orange-demo:latest
    environment:
      QT_QPA_PLATFORM: offscreen
      PYTHONUNBUFFERED: "1"
      # Defaults that match start.sh; uncomment to override:
      # PORT: "3000"
      # INTERNAL_API_URL: "http://127.0.0.1:8000"
      # NEXT_PUBLIC_API_BASE_URL: ""   # leave blank for same-origin
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  uploads:
